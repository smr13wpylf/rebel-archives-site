<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebel Archives — Writing Studio</title>
<meta name="description" content="A personal, distraction-free book writing studio. Your manuscripts live in your browser.">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#33523f">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ========== LIBRARY VIEW ========== -->
<div id="view-library" class="view" hidden>
  <header class="library-header">
    <div class="library-header-inner">
      <h1 class="brand"><span class="brand-mark">✒️</span> Rebel Archives <span class="brand-sub">Writing Studio</span></h1>
      <div class="library-actions">
        <button id="btn-import" class="btn btn-ghost" title="Import a backup file">Import backup</button>
        <button id="btn-backup" class="btn btn-ghost" title="Download all books as a JSON backup">Backup all</button>
        <div class="accent-picker" role="radiogroup" aria-label="Accent color"></div>
        <button id="btn-theme-lib" class="btn btn-icon" title="Toggle light/dark theme">◐</button>
      </div>
    </div>
  </header>
  <main class="library-main">
    <p class="library-tagline">Your manuscripts, stored privately in this browser.</p>
    <div id="book-grid" class="book-grid"></div>
  </main>
  <input type="file" id="import-file" accept="application/json" hidden>
</div>

<!-- ========== EDITOR VIEW ========== -->
<div id="view-editor" class="view" hidden>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-top">
      <button id="btn-back" class="btn btn-ghost btn-back" title="Back to library">← Library</button>
      <div class="accent-picker" role="radiogroup" aria-label="Accent color"></div>
      <button id="btn-theme" class="btn btn-icon" title="Toggle light/dark theme">◐</button>
    </div>

    <input id="book-title-input" class="book-title-input" type="text" placeholder="Untitled book" spellcheck="false" aria-label="Book title">
    <input id="book-author-input" class="book-author-input" type="text" placeholder="Author name" spellcheck="false" aria-label="Author name">

    <div class="sidebar-section-label">
      <span>Chapters</span>
      <button id="btn-add-chapter" class="btn btn-icon" title="Add chapter">＋</button>
    </div>
    <nav id="chapter-list" class="chapter-list" aria-label="Chapters"></nav>

    <div class="sidebar-bottom">
      <div class="goal-block">
        <div class="goal-row">
          <span class="goal-label">Today's goal</span>
          <button id="btn-edit-goal" class="goal-edit" title="Change daily word goal">✎</button>
        </div>
        <div class="goal-bar"><div id="goal-fill" class="goal-fill"></div></div>
        <div id="goal-text" class="goal-text">0 / 500 words</div>
      </div>
      <div id="book-total-words" class="book-total">0 words in manuscript</div>
      <div class="export-block">
        <div class="sidebar-section-label"><span>Export</span></div>
        <div class="export-buttons">
          <button class="btn btn-small" data-export="html" title="Download as a styled HTML file">HTML</button>
          <button class="btn btn-small" data-export="md" title="Download as Markdown">Markdown</button>
          <button class="btn btn-small" data-export="txt" title="Download as plain text">Text</button>
          <button class="btn btn-small" data-export="print" title="Open a print-ready copy (save as PDF)">Print / PDF</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main editing area -->
  <div class="editor-column">
    <div class="toolbar" id="toolbar" role="toolbar" aria-label="Formatting">
      <button id="btn-sidebar-toggle" class="btn-sidebar-toggle" title="Show/hide chapters">☰</button>
      <div class="toolbar-group">
        <select id="block-select" class="block-select" title="Paragraph style" aria-label="Paragraph style">
          <option value="P">Paragraph</option>
          <option value="H1">Heading 1</option>
          <option value="H2">Heading 2</option>
          <option value="BLOCKQUOTE">Quote</option>
        </select>
      </div>
      <div class="toolbar-group">
        <button class="tbtn" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button class="tbtn" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button class="tbtn" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
        <button class="tbtn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
      </div>
      <div class="toolbar-group">
        <button class="tbtn" data-cmd="insertUnorderedList" title="Bulleted list">•≡</button>
        <button class="tbtn" data-cmd="insertOrderedList" title="Numbered list">1≡</button>
        <button class="tbtn" id="btn-scene-break" title="Insert scene break">✳︎✳︎✳︎</button>
      </div>
      <div class="toolbar-group">
        <button class="tbtn" data-cmd="undo" title="Undo (Ctrl+Z)">↺</button>
        <button class="tbtn" data-cmd="redo" title="Redo (Ctrl+Y)">↻</button>
      </div>
      <div class="toolbar-spacer"></div>
      <span id="save-status" class="save-status" aria-live="polite">Saved</span>
      <button id="btn-focus" class="btn btn-ghost" title="Distraction-free mode (Esc to exit)">Focus</button>
    </div>

    <div class="page-scroll" id="page-scroll">
      <div class="page">
        <input id="chapter-title-input" class="chapter-title-input" type="text" placeholder="Chapter title" spellcheck="false" aria-label="Chapter title">
        <div id="editor" class="editor" contenteditable="true" spellcheck="true" aria-label="Chapter text"></div>
      </div>
    </div>

    <div class="statusbar">
      <span id="chapter-words" class="statusbar-item">0 words in chapter</span>
      <span id="session-words" class="statusbar-item">0 words today</span>
    </div>
  </div>

  <button id="btn-exit-focus" class="exit-focus" title="Exit focus mode (Esc)" hidden>Exit focus</button>
</div>

<script src="js/app.js"></script>
</body>
</html>
